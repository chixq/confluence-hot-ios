name: Build iOS IPA

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build app for iPhoneOS without code signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project ConfluenceHot.xcodeproj \
            -scheme ConfluenceHot \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          PRODUCT_DIR="build/DerivedData/Build/Products/Release-iphoneos"
          APP_PATH="${PRODUCT_DIR}/ConfluenceHot.app"
          test -d "${APP_PATH}"

          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "${APP_PATH}" build/Payload/

          (cd build && zip -qry ConfluenceHot-unsigned.ipa Payload)
          shasum -a 256 build/ConfluenceHot-unsigned.ipa > build/ConfluenceHot-unsigned.ipa.sha256

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConfluenceHot-unsigned-ipa
          path: |
            build/ConfluenceHot-unsigned.ipa
            build/ConfluenceHot-unsigned.ipa.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          NOTES="Unsigned IPA build for ${TAG_NAME}.

          Install note: use AltStore, SideStore, or another signing tool to sign and install this IPA. Direct Safari installation requires an Apple Developer signing setup such as Ad Hoc or TestFlight."

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              build/ConfluenceHot-unsigned.ipa \
              build/ConfluenceHot-unsigned.ipa.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${TAG_NAME}" \
              build/ConfluenceHot-unsigned.ipa \
              build/ConfluenceHot-unsigned.ipa.sha256 \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Confluence Hot iOS ${TAG_NAME#v}" \
              --notes "${NOTES}"
          fi
